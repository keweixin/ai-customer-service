# ============================================================
# Alembic configuration
# sqlalchemy.url is intentionally left empty: migrations/env.py
# reads DATABASE_URL from the environment, so credentials never
# land in version control.
#
# Usage:
#   alembic upgrade head
#   alembic revision --autogenerate -m "describe change"
# ============================================================

[alembic]
# Migration scripts directory
script_location = migrations

# File naming template: sequence + slug, e.g. 0001_initial.py
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Version table name (where Alembic stores the current revision in the DB)
version_table = alembic_version

# Database URL: left empty, injected by migrations/env.py from DATABASE_URL.
# This keeps secrets out of the repo and lets dev/prod read their own env.
sqlalchemy.url =

# Output encoding
output_encoding = utf-8


[post_write_hooks]
# Optional: auto-format generated migrations with ruff if installed.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# Built-in Alembic logging config (default).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
